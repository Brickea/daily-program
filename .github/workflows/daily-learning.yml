name: Daily Learning Docs

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Prepare git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install feedparser pyyaml

      - name: Collect and generate daily docs
        id: generate
        env:
          TZ: Asia/Shanghai
        run: python .github/scripts/collect_daily_content.py

      - name: Generate archive index
        run: python .github/scripts/generate_archive_index.py

      - name: Commit and push changes
        env:
          TODAY: ${{ steps.generate.outputs.today }}
        run: |
          set -euo pipefail
          today="$TODAY"
          if git status --porcelain | grep .; then
            git add docs
            git commit -m "chore: add ${today} daily learning content"
            git push
          else
            echo "No new daily docs generated."
          fi
