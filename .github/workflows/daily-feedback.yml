name: Daily Feedback Summary

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  summarize-and-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Prepare git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Summarize feedback and plan next day
        id: plan
        env:
          TZ: UTC
        run: python .github/scripts/generate_daily_feedback.py

      - name: Commit and push changes
        env:
          TOMORROW: ${{ steps.plan.outputs.tomorrow }}
        run: |
          set -euo pipefail
          tomorrow="$TOMORROW"
          if git status --porcelain | grep .; then
            git add docs
            git commit -m "chore: add ${tomorrow} feedback summary and plan"
            git push
          else
            echo "No new plans generated."
          fi
